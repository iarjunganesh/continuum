AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Continuum — agentic incident-response orchestrator.
  Deliberately NOT using ProvisionedConcurrencyConfig — see ADR 002.
  Every invocation must prove it can recover state from CockroachDB cold.

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.14

Resources:
  ContinuumOrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: continuum-orchestrator
      Handler: infra.lambda_handler.lambda_handler
      CodeUri: ../
      Environment:
        Variables:
          COCKROACH_DATABASE_URL: !Ref CockroachDatabaseUrl
          BEDROCK_REGION: !Ref BedrockRegion
          BEDROCK_EMBEDDING_MODEL_ID: !Ref BedrockEmbeddingModelId
          BEDROCK_REASONING_MODEL_ID: !Ref BedrockReasoningModelId
          LOG_LEVEL: INFO
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: '*'
      # No ProvisionedConcurrencyConfig — cold starts are intentional (ADR 002)

Parameters:
  # CockroachDB Cloud's cert is signed by a cluster-specific CA, not a public
  # one — sslmode=verify-full needs that exact CA file on disk, which Lambda's
  # execution environment won't have unless you fetch and ship it yourself
  # (hit, and documented, on the HF Space for the same reason; see
  # .env.example). sslmode=require encrypts without that dependency; decide
  # per the same synthetic-data trade-off noted there.
  CockroachDatabaseUrl:
    Type: String
    NoEcho: true
  # eu-central-1 (this function's own region) has a 0, non-adjustable
  # on-demand/cross-region Bedrock quota on this account for every model —
  # see ADR 008. eu-west-1 has full default quota, so Bedrock calls target
  # it directly while the function itself stays in eu-central-1 (ADR 007).
  BedrockRegion:
    Type: String
    Default: eu-west-1
  BedrockEmbeddingModelId:
    Type: String
    Default: amazon.titan-embed-text-v2:0
  BedrockReasoningModelId:
    Type: String
    Default: eu.anthropic.claude-sonnet-4-5-20250929-v1:0

Outputs:
  OrchestratorFunctionArn:
    Value: !GetAtt ContinuumOrchestratorFunction.Arn
